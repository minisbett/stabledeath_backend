name: Docker

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io

jobs:
  metadata:
    name: Prepare image metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      image: ${{ steps.image.outputs.image }}
      json: ${{ steps.meta.outputs.json }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Set image name
        id: image
        run: |
          echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

  build-amd64:
    name: Build linux/amd64 image
    needs: metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Set up cargo cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build Rust binary
        run: cross build --release --locked --target x86_64-unknown-linux-musl

      - name: Prepare Docker build context
        run: |
          mkdir -p dist/amd64
          cp target/x86_64-unknown-linux-musl/release/backend dist/amd64/backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          labels: ${{ needs.metadata.outputs.labels }}
          tags: ${{ needs.metadata.outputs.image }}:x86_64
          cache-from: type=gha,scope=x86_64-unknown-linux-musl
          cache-to: type=gha,mode=max,scope=x86_64-unknown-linux-musl

      - name: Build and push Docker image by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          labels: ${{ needs.metadata.outputs.labels }}
          outputs: type=image,name=${{ needs.metadata.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=x86_64-unknown-linux-musl
          cache-to: type=gha,mode=max,scope=x86_64-unknown-linux-musl

      - name: Export image digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Tag platform image
        if: github.event_name != 'pull_request'
        run: docker buildx imagetools create -t "${{ needs.metadata.outputs.image }}:x86_64" "${{ needs.metadata.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Upload image digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    name: Build linux/arm64 image
    needs: metadata
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build Rust binary
        env:
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target aarch64-unknown-linux-musl

      - name: Prepare Docker build context
        run: |
          mkdir -p dist/arm64
          cp target/aarch64-unknown-linux-musl/release/backend dist/arm64/backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          labels: ${{ needs.metadata.outputs.labels }}
          tags: ${{ needs.metadata.outputs.image }}:arm64
          cache-from: type=gha,scope=aarch64-unknown-linux-musl
          cache-to: type=gha,mode=max,scope=aarch64-unknown-linux-musl

      - name: Build and push Docker image by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          labels: ${{ needs.metadata.outputs.labels }}
          outputs: type=image,name=${{ needs.metadata.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=aarch64-unknown-linux-musl
          cache-to: type=gha,mode=max,scope=aarch64-unknown-linux-musl

      - name: Export image digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Tag platform image
        if: github.event_name != 'pull_request'
        run: docker buildx imagetools create -t "${{ needs.metadata.outputs.image }}:arm64" "${{ needs.metadata.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Upload image digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-platform image
    if: github.event_name != 'pull_request'
    needs:
      - metadata
      - build-amd64
      - build-arm64
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish manifest
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ needs.metadata.outputs.json }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)
